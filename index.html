<h2>Add Weekly Record</h2>
<form id="recordForm">
<div class="form-group">
<label for="customerName">Customer Name</label>
<input type="text" id="customerName" placeholder="Enter customer name" required>
</div>

<div class="form-group">
<label for="week">Week Ending Date</label>
<input type="date" id="week" required>
</div>

<div class="form-group">
<label>Daily Milk Quantity (in Liters)</label>
<div class="table-wrapper">
<table class="daily-entry-table">
<thead>
<tr>

</tr>
</thead>

<tr>

<td><input type="number" class="daily-input" placeholder="0" step="0.5" min="0"></td>
<td><input type="number" class="daily-input" placeholder="0" step="0.5" min="0"></td>
<td><input type="number" class="daily-input" placeholder="0" step="0.5" min="0"></td>
<td><input type="number" class="daily-input" placeholder="0" step="0.5" min="0"></td>
<td><input type="number" class="daily-input" placeholder="0" step="0.5" min="0"></td>
<td><input type="number" class="daily-input" placeholder="0" step="0.5" min="0"></td>
</tr>
</tbody>
</table>
</div>
</div>

<button class="btn btn-primary" type="submit">Add Record</button>
</form>
</section>

<section class="card">
<div class="section-header">
<h2>Billing Records</h2>

</div>
<div id="recordsList" class="records-list"></div>
</section>
